services:
  concert-postgres:
    image: postgres:18.3-bookworm
    container_name: concert-env-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./out/pgdata:/var/lib/postgresql
    restart: always
    # ports:
    #   - "5432:5432"

  concert-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./migrations:/migrations
    working_dir: /migrations
  
  concert-redis:
    image: redis:8.2.5-bookworm
    container_name: concert-env-redis
    # ports:
    #   - "6379:6379"
    restart: always

  concert-minio:
    image: minio/minio:latest
    container_name: concert-env-minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    # ports:
    #   - "9000:9000" # API
    #   - "9001:9001" # Console (Админка)
    volumes:
      - ./out/miniodata:/data
    command: server /data --console-address ":9001"
    restart: always

  concert-minio-setup:
    image: minio/mc
    depends_on:
      - concert-minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set local_minio http://concert-minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      /usr/bin/mc mb --ignore-existing local_minio/${S3_BUCKET_NAME};
      /usr/bin/mc anonymous set public local_minio/${S3_BUCKET_NAME};
      exit 0;
      "

  port-forwarder-postgres:
    image: alpine/socat:1.8.0.3
    container_name: concert-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:concert-postgres:5432
    ports:
      - "127.0.0.1:${POSTGRES_LOCAL_PORT:-5432}:5432"
    depends_on:
      - concert-postgres
    restart: always

  port-forwarder-redis:
    image: alpine/socat:1.8.0.3
    container_name: concert-port-forwarder-redis
    command: tcp-listen:6379,fork,reuseaddr tcp-connect:concert-redis:6379
    ports:
      - "127.0.0.1:6379:6379"
    depends_on:
      - concert-redis
    restart: always

  port-forwarder-minio:
    image: alpine/socat:1.8.0.3
    container_name: concert-port-forwarder-minio
    command: tcp-listen:9000,fork,reuseaddr tcp-connect:concert-minio:9000
    ports:
      - "127.0.0.1:9000:9000"
    depends_on:
      - concert-minio
    restart: always

  port-forwarder-minio-console:
    image: alpine/socat:1.8.0.3
    container_name: concert-port-forwarder-minio-console
    command: tcp-listen:9001,fork,reuseaddr tcp-connect:concert-minio:9001
    ports:
      - "127.0.0.1:9001:9001"
    depends_on:
      - concert-minio
    restart: always